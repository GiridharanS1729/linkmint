services:
  postgres:
    image: postgres:16-alpine
    container_name: linkmint-postgres
    environment:
      POSTGRES_DB: linkmint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linkmint-redis
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkmint-backend
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/linkmint
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 1m
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkmint-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  postgres_data:
